<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#8B6914">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spurgeon - Sermons &amp; Prayers</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --parchment: #f5edda;
  --parchment-dark: #e8d9b8;
  --gold: #8B6914;
  --gold-light: #c4972a;
  --terracotta: #7a3b2e;
  --faded: #9e8b6e;
  --white: #fdfaf3;
  --highlight: #fff3cd;
  --tab-height: 56px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--parchment);
  color: var(--ink);
  font-family: 'Crimson Pro', serif;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
#app-header {
  background: var(--ink);
  color: var(--parchment);
  padding: 0.8rem 1rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#app-header::before {
  content: 'C.H. SPURGEON';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  letter-spacing: 0.5rem;
  opacity: 0.05;
  pointer-events: none;
  white-space: nowrap;
  font-family: 'Crimson Pro', serif;
}
#app-header h1 {
  font-size: 1.4rem;
  font-weight: 300;
  letter-spacing: 0.15em;
  position: relative;
}
#back-btn {
  position: absolute;
  left: 0.8rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--gold-light);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 0.5rem;
  display: none;
  min-width: 44px;
  min-height: 44px;
  align-items: center;
  justify-content: center;
}

/* ===== CONTENT AREA ===== */
#content-area {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.view {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
  padding-bottom: 1rem;
}
.view.active { display: block; }

/* ===== FILTER BAR ===== */
.filter-bar {
  background: var(--parchment-dark);
  border-bottom: 2px solid var(--gold);
  padding: 0.6rem 1rem;
  display: flex;
  gap: 0.6rem;
  align-items: center;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 10;
}
.filter-bar label {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  color: var(--faded);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.filter-bar select {
  background: var(--white);
  border: 1px solid var(--parchment-dark);
  color: var(--ink);
  padding: 0.35rem 0.6rem;
  font-family: 'Crimson Pro', serif;
  font-size: 0.95rem;
  border-radius: 0;
  min-height: 36px;
  -webkit-appearance: none;
}
.filter-bar select:focus {
  border-color: var(--gold);
  outline: none;
}

/* ===== LIST ITEMS ===== */
.list-container { padding: 0; }
.list-item {
  display: flex;
  align-items: flex-start;
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--parchment-dark);
  cursor: pointer;
  transition: background 0.15s;
  min-height: 52px;
  gap: 0.6rem;
}
.list-item:active { background: var(--highlight); }
.list-compact {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.list-compact .list-item {
  padding: 0.3rem 0.7rem;
  min-height: 0;
  align-items: center;
  gap: 0.3rem;
  border-bottom: 1px solid var(--parchment-dark);
  border-right: 1px solid var(--parchment-dark);
}
.list-compact .list-item:nth-child(2n) { border-right: none; }
.list-compact .list-title { font-size: 0.95rem; line-height: 1.3; }
.list-compact .list-num { font-size: 0.7rem; min-width: 1.5rem; padding-top: 0; }
.list-compact .list-fav { font-size: 0.8rem; min-width: 32px; min-height: 32px; }
.list-num {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--gold);
  min-width: 2.8rem;
  padding-top: 0.15rem;
  flex-shrink: 0;
}
.list-body { flex: 1; min-width: 0; }
.list-title {
  font-size: 1.05rem;
  font-weight: 400;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.list-sub {
  font-size: 0.8rem;
  color: var(--faded);
  font-style: italic;
  margin-top: 0.1rem;
}
.list-fav {
  flex-shrink: 0;
  background: none;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.3rem;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--parchment-dark);
  transition: color 0.15s;
}
.list-fav.favorited { color: var(--terracotta); }

/* ===== PAGINATION ===== */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0.8rem;
  padding: 1rem;
  flex-wrap: wrap;
}
.pagination button {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 0.4rem 1rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  cursor: pointer;
  letter-spacing: 0.08em;
  min-width: 44px;
  min-height: 44px;
  transition: all 0.2s;
}
.pagination button:disabled {
  opacity: 0.3;
  cursor: default;
}
.pagination button:not(:disabled):active {
  background: var(--gold);
  color: var(--white);
}
.pagination span {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--faded);
}

/* ===== DETAIL VIEW ===== */
.detail-header {
  background: var(--parchment-dark);
  border-bottom: 2px solid var(--gold);
  padding: 1rem 1.2rem;
}
.detail-title {
  font-size: 1.4rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  line-height: 1.3;
}
.detail-meta {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  color: var(--faded);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}
.detail-actions {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.6rem;
  flex-wrap: wrap;
}
.detail-btn {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 0.35rem 0.9rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.2s;
  min-height: 36px;
}
.detail-btn.on {
  background: var(--gold);
  color: var(--white);
}
.detail-btn:active {
  background: var(--gold);
  color: var(--white);
}
.detail-text {
  padding: 1.2rem;
  font-size: 1.05rem;
  line-height: 1.75;
  word-wrap: break-word;
  max-width: 700px;
  margin: 0 auto;
}
.detail-text p {
  margin: 0.8em 0;
  text-indent: 1.5em;
}
.detail-text p:first-child { text-indent: 0; }
.detail-text h2 {
  font-size: 1.1em;
  font-weight: normal;
  font-style: italic;
  text-align: center;
  margin: 0.5em 0 1.2em;
  color: var(--accent);
}
.detail-text blockquote {
  margin: 0.8em 1.5em;
  padding-left: 1em;
  border-left: 3px solid var(--gold);
  font-style: italic;
}
.detail-text .verse {
  text-align: center;
  font-style: italic;
  margin: 1em 0;
  line-height: 1.9;
}
.detail-text em { font-style: italic; }
.detail-text strong { font-weight: 600; }
.detail-text .chunk-active {
  background: rgba(196, 163, 90, 0.15);
  border-left: 3px solid var(--gold);
  padding-left: 0.5em;
  transition: background 0.3s;
}
.detail-text.loading {
  text-align: center;
  color: var(--faded);
  font-style: italic;
  padding-top: 3rem;
}
.notes-section {
  background: var(--highlight);
  border-top: 2px solid var(--gold);
  padding: 1.2rem;
  margin-top: 1rem;
}
.notes-section h3 {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
.notes-text {
  font-size: 0.95rem;
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
  max-width: 700px;
  margin: 0 auto;
}

/* ===== SEARCH ===== */
.search-input-wrap {
  padding: 0.8rem 1rem;
  background: var(--parchment-dark);
  border-bottom: 2px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 10;
}
.search-input-wrap input {
  width: 100%;
  background: var(--white);
  border: 1px solid var(--parchment-dark);
  color: var(--ink);
  padding: 0.6rem 1rem;
  font-family: 'Crimson Pro', serif;
  font-size: 1.1rem;
  border-radius: 0;
  min-height: 44px;
}
.search-input-wrap input:focus {
  border-color: var(--gold);
  outline: none;
}
.index-tabs {
  display: flex;
  gap: 0;
  padding: 0.5rem 1rem;
  background: var(--parchment-dark);
}
.index-tab {
  flex: 1;
  padding: 0.5rem;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--ink);
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  cursor: pointer;
}
.index-tab:first-child { border-radius: 4px 0 0 4px; }
.index-tab:last-child { border-radius: 0 4px 4px 0; }
.index-tab.active {
  background: var(--gold);
  color: var(--parchment);
}
.index-letter-header {
  padding: 0.3rem 1rem;
  background: var(--parchment-dark);
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--accent);
  position: sticky;
  top: 0;
  z-index: 5;
}
.search-hint {
  padding: 2rem 1rem;
  text-align: center;
  color: var(--faded);
  font-style: italic;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  padding: 3rem 1.5rem;
  text-align: center;
  color: var(--faded);
}
.empty-state p {
  font-style: italic;
  font-size: 1.1rem;
  margin-bottom: 0.5rem;
}
.empty-state small {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
}

/* ===== AUDIO PLAYER (inline in detail header) ===== */
.detail-title-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.detail-title-row .detail-title {
  flex: 1;
  min-width: 0;
}
.player-panel {
  display: none;
}
.player-panel.visible { display: block; }
.player-transport {
  display: flex;
  align-items: center;
  gap: 0.15rem;
  flex-shrink: 0;
}
.player-transport button {
  background: none;
  border: none;
  color: var(--gold);
  font-size: 0.9rem;
  cursor: pointer;
  min-width: 32px;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  padding: 0;
  flex-shrink: 0;
}
.player-transport button:active {
  background: rgba(139,105,20,0.15);
}
.player-transport .play-btn {
  font-size: 1rem;
  min-width: 36px;
  min-height: 36px;
  background: var(--gold);
  color: var(--white);
  border-radius: 50%;
}
.player-transport .play-btn:active {
  background: var(--gold-light);
}
.player-speed {
  background: none;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  padding: 0.1rem 0.35rem;
  cursor: pointer;
  min-height: 24px;
  border-radius: 3px;
  flex-shrink: 0;
}
.player-seek-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 0.5rem;
}
.player-seek {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(139,105,20,0.2);
  border-radius: 2px;
  outline: none;
  min-width: 60px;
}
.player-seek::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
}
.player-time {
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  color: var(--faded);
  min-width: 2.2rem;
  text-align: center;
  flex-shrink: 0;
}
.player-vol-wrap {
  display: flex;
  align-items: center;
  gap: 0.2rem;
  margin-left: 0.6rem;
  flex-shrink: 0;
}
.player-vol {
  width: 60px;
  height: 3px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(139,105,20,0.2);
  border-radius: 2px;
  outline: none;
}
.player-vol::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
}
.vol-icon {
  color: var(--gold);
  font-size: 0.65rem;
  flex-shrink: 0;
}
.player-badge { display: none; }
/* ===== BOTTOM TAB BAR ===== */
#tab-bar {
  background: var(--ink);
  display: flex;
  flex-shrink: 0;
  border-top: 1px solid rgba(139,105,20,0.3);
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.4rem 0;
  min-height: var(--tab-height);
  cursor: pointer;
  background: none;
  border: none;
  color: var(--faded);
  transition: color 0.2s;
  font-family: 'Space Mono', monospace;
}
.tab-icon { font-size: 1.3rem; line-height: 1; }
.tab-label {
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 0.2rem;
}
.tab.active { color: var(--gold-light); }

/* Safe area for notched phones */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  #tab-bar { padding-bottom: env(safe-area-inset-bottom); }
}

/* ===== TABLET ===== */
@media (min-width: 768px) {
  .list-item { padding: 1rem 1.5rem; }
  .detail-text { font-size: 1.15rem; padding: 1.5rem 2rem; }
  .detail-header { padding: 1.2rem 2rem; }
  #app-header h1 { font-size: 1.6rem; }
}

/* ===== LARGE TABLET / DESKTOP ===== */
@media (min-width: 1024px) {
  .list-container { max-width: 800px; margin: 0 auto; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="app-header">
  <button id="back-btn" aria-label="Go back">&#x2190;</button>
  <h1 id="header-title">Spurgeon</h1>
</div>

<!-- MAIN CONTENT -->
<div id="content-area">

  <!-- SERMONS LIST -->
  <div id="view-sermons" class="view active">
    <div class="filter-bar">
      <label>Volume</label>
      <select id="vol-filter"></select>
      <label style="margin-left:auto">Sort</label>
      <select id="sort-filter">
        <option value="num">Number</option>
        <option value="title">Title</option>
      </select>
    </div>
    <div id="sermon-list" class="list-container"></div>
    <div id="sermon-pagination" class="pagination"></div>
  </div>

  <!-- SERMON DETAIL -->
  <div id="view-sermon-detail" class="view">
    <div class="detail-header">
      <div class="detail-title-row">
        <div class="detail-title" id="sermon-detail-title"></div>
        <div class="player-panel" id="sermon-player">
          <div class="player-transport">
            <button id="sp-restart" title="Restart">&#9198;</button>
            <button id="sp-back15" title="Back 15s">&#x23EA;</button>
            <button class="play-btn" id="sp-play" title="Play">&#9654;</button>
            <button id="sp-fwd15" title="Forward 15s">&#x23E9;</button>
            <button class="player-speed" id="sp-speed">1.5x</button>
          </div>
          <span class="player-badge" id="sp-badge" style="display:none"></span>
        </div>
      </div>
      <div class="detail-meta" id="sermon-detail-meta"></div>
      <div class="player-panel player-seek-section" id="sermon-player-seek" style="display:none">
        <div class="player-seek-row">
          <span class="player-time" id="sp-time-cur">0:00</span>
          <input type="range" id="sp-slider" class="player-seek" min="0" max="100" value="0">
          <span class="player-time" id="sp-time-end">0:00</span>
          <div class="player-vol-wrap">
            <span class="vol-icon">&#x1F509;</span>
            <input type="range" id="sp-volume" class="player-vol" min="0" max="100" value="80">
            <span class="vol-icon">&#x1F50A;</span>
          </div>
        </div>
      </div>
      <div class="detail-actions">
        <button class="detail-btn" id="notes-toggle">Speaker Notes</button>
        <button class="detail-btn" id="sermon-fav-btn"></button>
      </div>
    </div>
    <div class="notes-section" id="notes-section" style="display:none">
      <h3>Speaker Notes</h3>
      <div class="notes-text" id="notes-text"></div>
    </div>
    <div class="detail-text loading" id="sermon-detail-text">Loading sermon...</div>
  </div>

  <!-- PRAYERS LIST -->
  <div id="view-prayers" class="view">
    <div id="prayer-list" class="list-container list-compact"></div>
  </div>

  <!-- PRAYER DETAIL -->
  <div id="view-prayer-detail" class="view">
    <div class="detail-header">
      <div class="detail-title-row">
        <div class="detail-title" id="prayer-detail-title"></div>
        <div class="player-panel" id="prayer-player">
          <div class="player-transport">
            <button id="pp-restart" title="Restart">&#9198;</button>
            <button id="pp-back15" title="Back 15s">&#x23EA;</button>
            <button class="play-btn" id="pp-play" title="Play">&#9654;</button>
            <button id="pp-fwd15" title="Forward 15s">&#x23E9;</button>
            <button class="player-speed" id="pp-speed">1.5x</button>
          </div>
          <span class="player-badge" id="pp-badge" style="display:none"></span>
        </div>
      </div>
      <div class="detail-meta" id="prayer-detail-meta"></div>
      <div class="player-panel player-seek-section" id="prayer-player-seek" style="display:none">
        <div class="player-seek-row">
          <span class="player-time" id="pp-time-cur">0:00</span>
          <input type="range" id="pp-slider" class="player-seek" min="0" max="100" value="0">
          <span class="player-time" id="pp-time-end">0:00</span>
          <div class="player-vol-wrap">
            <span class="vol-icon">&#x1F509;</span>
            <input type="range" id="pp-volume" class="player-vol" min="0" max="100" value="80">
            <span class="vol-icon">&#x1F50A;</span>
          </div>
        </div>
      </div>
      <div class="detail-actions">
        <button class="detail-btn" id="prayer-fav-btn"></button>
      </div>
    </div>
    <div class="detail-text loading" id="prayer-detail-text">Loading prayer...</div>
  </div>

  <!-- FAVORITES -->
  <div id="view-favorites" class="view">
    <div id="fav-list" class="list-container"></div>
  </div>

  <!-- INDEX -->
  <div id="view-index" class="view">
    <div class="index-tabs">
      <button class="index-tab active" id="idx-tab-title">By Title</button>
      <button class="index-tab" id="idx-tab-verse">By Verse</button>
    </div>
    <div id="index-title-list" class="list-container"></div>
    <div id="index-verse-list" class="list-container" style="display:none"></div>
  </div>

  <!-- RESOURCES -->
  <div id="view-resources" class="view">
    <div id="resources-list" class="list-container"></div>
  </div>

  <!-- RESOURCE DETAIL -->
  <div id="view-resource-detail" class="view">
    <div class="detail-header">
      <div class="detail-title" id="resource-detail-title"></div>
      <div class="detail-meta" id="resource-detail-meta"></div>
    </div>
    <div class="detail-text loading" id="resource-detail-text">Loading...</div>
  </div>

  <!-- SEARCH -->
  <div id="view-search" class="view">
    <div class="search-input-wrap">
      <input type="search" id="search-input" placeholder="Search by title, number, or scripture...">
    </div>
    <div id="search-results" class="list-container">
      <div class="search-hint">Search sermons and prayers by title, sermon number, or scripture reference.</div>
    </div>
  </div>

</div>

<!-- hidden audio element for MP3 playback -->
<audio id="audio-el" style="display:none"></audio>

<!-- BOTTOM TAB BAR -->
<div id="tab-bar">
  <button class="tab" data-tab="nowplaying" id="tab-nowplaying" style="display:none">
    <span class="tab-icon">&#x1F3B5;</span>
    <span class="tab-label">Playing</span>
  </button>
  <button class="tab active" data-tab="sermons" id="tab-sermons">
    <span class="tab-icon">&#x1F4D6;</span>
    <span class="tab-label">Sermons</span>
  </button>
  <button class="tab" data-tab="prayers" id="tab-prayers">
    <span class="tab-icon">&#x1F64F;</span>
    <span class="tab-label">Prayers</span>
  </button>
  <button class="tab" data-tab="favorites" id="tab-favorites">
    <span class="tab-icon">&#x2764;</span>
    <span class="tab-label">Favorites</span>
  </button>
  <button class="tab" data-tab="index" id="tab-index">
    <span class="tab-icon">&#x1F4D1;</span>
    <span class="tab-label">Index</span>
  </button>
  <button class="tab" data-tab="resources" id="tab-resources">
    <span class="tab-icon">&#x1F4DA;</span>
    <span class="tab-label">Resources</span>
  </button>
  <button class="tab" data-tab="search" id="tab-search">
    <span class="tab-icon">&#x1F50D;</span>
    <span class="tab-label">Search</span>
  </button>
</div>

<script>
(function() {
'use strict';

/* ========== STATE ========== */
var manifest = { sermons: [], prayers: [] };
var favorites = [];
try { favorites = JSON.parse(localStorage.getItem('spurgeon-favs') || '[]'); } catch(e) { favorites = []; }
var currentTab = 'sermons';
var sermonPage = 0;
var filteredSermons = [];
var PAGE_SIZE = 50;
var currentDetailType = null;
var currentDetailItem = null;
var nowPlayingType = null;
var nowPlayingItem = null;
var notesVisible = false;
var speeds = [1.5, 1.75, 2, 1, 1.25];
var searchTimeout = null;

/* ========== TTS STATE ========== */
var ttsAvailable = false;  // can we use TTS on this platform?
var ttsUseNative = false;  // use Capacitor plugin (Android) vs Web Speech API

// Detect TTS capability
try {
  if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
    ttsAvailable = true;
    ttsUseNative = true;
  } else if (window.speechSynthesis) {
    ttsAvailable = true;
    ttsUseNative = false;
  }
} catch(e) { /* not available */ }

/* ========== DOM REFS ========== */
var $headerTitle = document.getElementById('header-title');
var $backBtn = document.getElementById('back-btn');
var $volFilter = document.getElementById('vol-filter');
var $sortFilter = document.getElementById('sort-filter');
var $sermonList = document.getElementById('sermon-list');
var $sermonPag = document.getElementById('sermon-pagination');
var $prayerList = document.getElementById('prayer-list');
var $favList = document.getElementById('fav-list');
var $searchInput = document.getElementById('search-input');
var $searchResults = document.getElementById('search-results');
var $audioEl = document.getElementById('audio-el');

/* ========== PLAYER CONTEXT ========== */
// Tracks which player is active: 'sp' or 'pp' (or null)
var activePlayer = null;
// Per-player TTS state
var playerState = {
  sp: { ttsMode: false, ttsChunks: [], ttsChunkIdx: 0, ttsSpeaking: false, ttsPaused: false, playing: false, speedIdx: 0 },
  pp: { ttsMode: false, ttsChunks: [], ttsChunkIdx: 0, ttsSpeaking: false, ttsPaused: false, playing: false, speedIdx: 0 }
};

function getPlayerEls(prefix) {
  return {
    panel: document.getElementById(prefix === 'sp' ? 'sermon-player' : 'prayer-player'),
    seekPanel: document.getElementById(prefix === 'sp' ? 'sermon-player-seek' : 'prayer-player-seek'),
    restart: document.getElementById(prefix + '-restart'),
    back15: document.getElementById(prefix + '-back15'),
    play: document.getElementById(prefix + '-play'),
    fwd15: document.getElementById(prefix + '-fwd15'),
    slider: document.getElementById(prefix + '-slider'),
    timeCur: document.getElementById(prefix + '-time-cur'),
    timeEnd: document.getElementById(prefix + '-time-end'),
    badge: document.getElementById(prefix + '-badge'),
    speed: document.getElementById(prefix + '-speed'),
    volume: document.getElementById(prefix + '-volume')
  };
}

function showPlayerPanel(prefix) {
  var els = getPlayerEls(prefix);
  els.panel.classList.add('visible');
  els.seekPanel.style.display = 'block';
}

function hidePlayerPanel(prefix) {
  var els = getPlayerEls(prefix);
  els.panel.classList.remove('visible');
  els.seekPanel.style.display = 'none';
}

function resetPlayerState(prefix) {
  var st = playerState[prefix];
  st.ttsMode = false;
  st.ttsChunks = [];
  st.ttsChunkIdx = 0;
  st.ttsSpeaking = false;
  st.ttsPaused = false;
  st.playing = false;
  st.speedIdx = 0;
  var els = getPlayerEls(prefix);
  els.play.innerHTML = '&#9654;';
  els.slider.value = 0;
  els.timeCur.textContent = '0:00';
  els.timeEnd.textContent = '0:00';
  els.speed.textContent = speeds[0] + 'x';
  els.badge.className = 'player-badge';
  els.badge.textContent = '';
}

function setPlayerBadge(prefix, mode) {
  var els = getPlayerEls(prefix);
  els.badge.className = 'player-badge';
  if (mode === 'mp3') {
    els.badge.textContent = 'MP3';
    els.badge.classList.add('mp3');
  } else if (mode === 'tts') {
    els.badge.textContent = 'LIVE';
    els.badge.classList.add('tts');
  }
}

/* ========== INIT ========== */
function init() {
  fetch('./data/manifest.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      manifest = data;
      populateVolumeFilter();
      filteredSermons = manifest.sermons.slice();
      renderSermonList();
      renderPrayerList();
    })
    .catch(function(e) { console.error('Failed to load manifest:', e); });

  // Event listeners
  $backBtn.addEventListener('click', goBack);
  $volFilter.addEventListener('change', filterSermons);
  $sortFilter.addEventListener('change', filterSermons);
  $searchInput.addEventListener('input', onSearch);
  document.getElementById('notes-toggle').addEventListener('click', toggleNotes);
  document.getElementById('sermon-fav-btn').addEventListener('click', toggleFavDetail);
  document.getElementById('prayer-fav-btn').addEventListener('click', toggleFavDetail);

  // Wire up both player panels
  wirePlayerPanel('sp');
  wirePlayerPanel('pp');

  // Audio element events
  $audioEl.addEventListener('loadedmetadata', function() {
    if (!activePlayer) return;
    var els = getPlayerEls(activePlayer);
    els.timeEnd.textContent = formatTime($audioEl.duration);
    els.slider.max = Math.floor($audioEl.duration);
    showPlayerPanel(activePlayer);
  });
  $audioEl.addEventListener('error', function() {
    if (activePlayer) hidePlayerPanel(activePlayer);
  });
  $audioEl.addEventListener('timeupdate', function() {
    if (!activePlayer || playerState[activePlayer].ttsMode) return;
    if ($audioEl.duration) {
      var els = getPlayerEls(activePlayer);
      els.slider.value = Math.floor($audioEl.currentTime);
      els.timeCur.textContent = formatTime($audioEl.currentTime);
    }
  });
  $audioEl.addEventListener('ended', function() {
    if (!activePlayer) return;
    var st = playerState[activePlayer];
    st.playing = false;
    var els = getPlayerEls(activePlayer);
    els.play.innerHTML = '&#9654;';
  });

  // Tab bar
  document.querySelectorAll('.tab').forEach(function(btn) {
    btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
  });

  // History
  window.addEventListener('popstate', function(e) { goBack(); });

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  }
}

function wirePlayerPanel(prefix) {
  var els = getPlayerEls(prefix);

  els.play.addEventListener('click', function() {
    activePlayer = prefix;
    togglePlayerAudio(prefix);
  });

  els.restart.addEventListener('click', function() {
    activePlayer = prefix;
    var st = playerState[prefix];
    if (st.ttsMode) {
      stopTts(prefix);
      st.ttsChunkIdx = 0;
      updateTtsProgress(prefix);
      if (st.playing) { st.ttsPaused = false; speakChunk(prefix, 0); }
    } else {
      $audioEl.currentTime = 0;
    }
  });

  els.back15.addEventListener('click', function() {
    activePlayer = prefix;
    var st = playerState[prefix];
    if (st.ttsMode) {
      // Move to previous chunk
      if (st.ttsChunkIdx > 0) {
        stopTts(prefix);
        st.ttsChunkIdx--;
        updateTtsProgress(prefix);
        if (st.playing) { st.ttsPaused = false; speakChunk(prefix, st.ttsChunkIdx); }
      }
    } else {
      $audioEl.currentTime = Math.max(0, $audioEl.currentTime - 15);
    }
  });

  els.fwd15.addEventListener('click', function() {
    activePlayer = prefix;
    var st = playerState[prefix];
    if (st.ttsMode) {
      // Move to next chunk
      if (st.ttsChunkIdx < st.ttsChunks.length - 1) {
        stopTts(prefix);
        st.ttsChunkIdx++;
        updateTtsProgress(prefix);
        if (st.playing) { st.ttsPaused = false; speakChunk(prefix, st.ttsChunkIdx); }
      }
    } else {
      $audioEl.currentTime = Math.min($audioEl.duration || 0, $audioEl.currentTime + 15);
    }
  });

  els.slider.addEventListener('input', function() {
    activePlayer = prefix;
    var st = playerState[prefix];
    if (st.ttsMode) {
      if (st.ttsChunks.length === 0) return;
      var targetChunk = Math.round(parseFloat(els.slider.value));
      targetChunk = Math.max(0, Math.min(targetChunk, st.ttsChunks.length - 1));
      stopTts(prefix);
      st.ttsChunkIdx = targetChunk;
      updateTtsProgress(prefix);
      if (st.playing) { st.ttsPaused = false; speakChunk(prefix, st.ttsChunkIdx); }
    } else {
      $audioEl.currentTime = parseFloat(els.slider.value);
    }
  });

  els.speed.addEventListener('click', function() {
    activePlayer = prefix;
    var st = playerState[prefix];
    st.speedIdx = (st.speedIdx + 1) % speeds.length;
    if (!st.ttsMode) {
      $audioEl.playbackRate = speeds[st.speedIdx];
    } else {
      // TTS: new speed applies to next chunk automatically
    }
    els.speed.textContent = speeds[st.speedIdx] + 'x';
  });

  els.volume.addEventListener('input', function() {
    activePlayer = prefix;
    var st = playerState[prefix];
    if (!st.ttsMode) {
      $audioEl.volume = parseFloat(els.volume.value) / 100;
    }
  });
}

/* ========== TAB SWITCHING ========== */
function switchTab(tab) {
  if (tab === 'nowplaying') {
    returnToNowPlaying();
    return;
  }
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  showView('view-' + tab);
  $backBtn.style.display = 'none';
  updateHeaderTitle();

  if (tab === 'favorites') renderFavorites();
  if (tab === 'index') renderIndex();
  if (tab === 'resources') renderResources();
  if (tab === 'search') {
    setTimeout(function() { $searchInput.focus(); }, 100);
  }
  history.pushState({ tab: tab }, '', '');
}

function showNowPlayingTab() {
  document.getElementById('tab-nowplaying').style.display = '';
}

function hideNowPlayingTab() {
  document.getElementById('tab-nowplaying').style.display = 'none';
}

function returnToNowPlaying() {
  if (!nowPlayingItem || !nowPlayingType) return;
  // Navigate to the detail view without restarting audio
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-nowplaying').classList.add('active');
  $backBtn.style.display = 'flex';

  if (nowPlayingType === 'sermon') {
    currentTab = 'sermons';
    currentDetailType = 'sermon';
    currentDetailItem = nowPlayingItem;
    var s = nowPlayingItem;
    document.getElementById('sermon-detail-title').textContent = s.title;
    document.getElementById('sermon-detail-meta').textContent =
      'Sermon #' + s.num + (s.scripture ? '  |  ' + s.scripture : '') + '  |  Volume ' + s.volume;
    var fav = isFavorite('sermon', s.num);
    document.getElementById('sermon-fav-btn').textContent = fav ? '\u2764' : '\u2661';
    document.getElementById('sermon-fav-btn').classList.toggle('favorited', fav);
    showView('view-sermon-detail');
    $headerTitle.textContent = '#' + s.num;
    // Show the player panel without resetting audio
    showPlayerPanel('sp');
  } else {
    currentTab = 'prayers';
    currentDetailType = 'prayer';
    currentDetailItem = nowPlayingItem;
    var p = nowPlayingItem;
    document.getElementById('prayer-detail-title').textContent = p.title;
    document.getElementById('prayer-detail-meta').textContent = 'Prayer #' + p.num;
    var fav = isFavorite('prayer', p.num);
    document.getElementById('prayer-fav-btn').textContent = fav ? '\u2764' : '\u2661';
    document.getElementById('prayer-fav-btn').classList.toggle('favorited', fav);
    showView('view-prayer-detail');
    $headerTitle.textContent = p.title;
    showPlayerPanel('pp');
  }
}

function showView(id) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function updateHeaderTitle() {
  var titles = { sermons: 'Sermons', prayers: 'Prayers', favorites: 'Favorites', index: 'Index', resources: 'Resources', search: 'Search' };
  $headerTitle.textContent = titles[currentTab] || 'Spurgeon';
}

/* ========== SERMON LIST ========== */
function populateVolumeFilter() {
  var html = '<option value="0">All (1\u201363)</option>';
  for (var v = 1; v <= 63; v++) {
    html += '<option value="' + v + '">Vol ' + v + '</option>';
  }
  $volFilter.innerHTML = html;
}

function filterSermons() {
  var vol = parseInt($volFilter.value);
  var sort = $sortFilter.value;

  filteredSermons = manifest.sermons.slice();
  if (vol > 0) {
    filteredSermons = filteredSermons.filter(function(s) { return s.volume === vol; });
  }
  if (sort === 'title') {
    filteredSermons.sort(function(a, b) { return a.title.localeCompare(b.title); });
  } else {
    filteredSermons.sort(function(a, b) { return a.num - b.num; });
  }

  sermonPage = 0;
  renderSermonList();
}

function renderSermonList() {
  var start = sermonPage * PAGE_SIZE;
  var page = filteredSermons.slice(start, start + PAGE_SIZE);
  var html = '';

  for (var i = 0; i < page.length; i++) {
    var s = page[i];
    var fav = isFavorite('sermon', s.num);
    html += '<div class="list-item" data-type="sermon" data-num="' + s.num + '">'
      + '<div class="list-num">#' + s.num + '</div>'
      + '<div class="list-body">'
      + '<div class="list-title">' + escHtml(s.title) + '</div>'
      + (s.scripture ? '<div class="list-sub">' + escHtml(s.scripture) + '</div>' : '')
      + '</div>'
      + '<button class="list-fav' + (fav ? ' favorited' : '') + '" data-fav-type="sermon" data-fav-num="' + s.num + '">'
      + (fav ? '&#x2764;' : '&#x2661;')
      + '</button></div>';
  }
  $sermonList.innerHTML = html;

  // Pagination
  var totalPages = Math.ceil(filteredSermons.length / PAGE_SIZE);
  if (totalPages <= 1) {
    $sermonPag.innerHTML = '';
    return;
  }
  $sermonPag.innerHTML =
    '<button data-page="0"' + (sermonPage === 0 ? ' disabled' : '') + '>First</button>'
    + '<button data-page="prev"' + (sermonPage === 0 ? ' disabled' : '') + '>Prev</button>'
    + '<span>' + (sermonPage + 1) + ' / ' + totalPages + '</span>'
    + '<button data-page="next"' + (sermonPage >= totalPages - 1 ? ' disabled' : '') + '>Next</button>'
    + '<button data-page="' + (totalPages - 1) + '"' + (sermonPage >= totalPages - 1 ? ' disabled' : '') + '>Last</button>';
}

// Delegated click handlers for sermon list and pagination
$sermonList.addEventListener('click', function(e) {
  var favBtn = e.target.closest('.list-fav');
  if (favBtn) {
    e.stopPropagation();
    toggleFav(favBtn.dataset.favType, parseInt(favBtn.dataset.favNum), favBtn);
    return;
  }
  var item = e.target.closest('.list-item');
  if (item) openSermon(parseInt(item.dataset.num));
});

$sermonPag.addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn || btn.disabled) return;
  var p = btn.dataset.page;
  if (p === 'prev') sermonPage--;
  else if (p === 'next') sermonPage++;
  else sermonPage = parseInt(p);
  renderSermonList();
  document.getElementById('view-sermons').scrollTop = 0;
});

/* ========== PRAYER LIST ========== */
function renderPrayerList() {
  var html = '';
  for (var i = 0; i < manifest.prayers.length; i++) {
    var p = manifest.prayers[i];
    var fav = isFavorite('prayer', p.num);
    html += '<div class="list-item" data-type="prayer" data-num="' + p.num + '">'
      + '<div class="list-num">' + p.num + '</div>'
      + '<div class="list-body">'
      + '<div class="list-title">' + escHtml(p.title) + '</div>'
      + '</div>'
      + '<button class="list-fav' + (fav ? ' favorited' : '') + '" data-fav-type="prayer" data-fav-num="' + p.num + '">'
      + (fav ? '&#x2764;' : '&#x2661;')
      + '</button></div>';
  }
  $prayerList.innerHTML = html;
}

$prayerList.addEventListener('click', function(e) {
  var favBtn = e.target.closest('.list-fav');
  if (favBtn) {
    e.stopPropagation();
    toggleFav(favBtn.dataset.favType, parseInt(favBtn.dataset.favNum), favBtn);
    return;
  }
  var item = e.target.closest('.list-item');
  if (item) openPrayer(parseInt(item.dataset.num));
});

/* ========== DETAIL VIEWS ========== */
function openSermon(num) {
  var s = null;
  for (var i = 0; i < manifest.sermons.length; i++) {
    if (manifest.sermons[i].num === num) { s = manifest.sermons[i]; break; }
  }
  if (!s) return;
  currentDetailType = 'sermon';
  currentDetailItem = s;
  notesVisible = false;

  document.getElementById('sermon-detail-title').textContent = s.title;
  document.getElementById('sermon-detail-meta').textContent =
    'Sermon #' + s.num + (s.scripture ? '  |  ' + s.scripture : '') + '  |  Volume ' + s.volume;

  var fav = isFavorite('sermon', s.num);
  var favBtn = document.getElementById('sermon-fav-btn');
  favBtn.textContent = fav ? 'Favorited' : 'Favorite';
  favBtn.classList.toggle('on', fav);

  document.getElementById('notes-toggle').classList.remove('on');
  document.getElementById('notes-section').style.display = 'none';

  var textEl = document.getElementById('sermon-detail-text');
  textEl.className = 'detail-text loading';
  textEl.textContent = 'Loading sermon...';

  showView('view-sermon-detail');
  $backBtn.style.display = 'flex';
  $headerTitle.textContent = '#' + s.num;
  history.pushState({ tab: currentTab, detail: 'sermon', num: num }, '', '');

  fetch('./data/sermons_html/' + s.file + '.html')
    .then(function(r) {
      if (!r.ok) throw new Error('No HTML');
      return r.text();
    })
    .then(function(html) {
      textEl.className = 'detail-text';
      textEl.innerHTML = html;
    })
    .catch(function() {
      // Fall back to plain text
      fetch('./data/sermons/' + s.file + '.txt')
        .then(function(r) { return r.ok ? r.text() : Promise.reject(); })
        .then(function(text) {
          textEl.className = 'detail-text';
          var lines = text.split('\n');
          textEl.textContent = lines.slice(3).join('\n');
        })
        .catch(function() {
          textEl.className = 'detail-text';
          textEl.textContent = 'Sermon text not available.';
        });
    });

  // Only set up audio if nothing is currently playing, or if opening the same sermon
  if (!nowPlayingItem || nowPlayingItem.num === s.num) {
    checkSermonAudio(s.file);
  } else {
    // Something else is playing — just hide this sermon's player
    hidePlayerPanel('sp');
  }
}

function openPrayer(num) {
  var p = null;
  for (var i = 0; i < manifest.prayers.length; i++) {
    if (manifest.prayers[i].num === num) { p = manifest.prayers[i]; break; }
  }
  if (!p) return;
  currentDetailType = 'prayer';
  currentDetailItem = p;

  document.getElementById('prayer-detail-title').textContent = p.title;
  document.getElementById('prayer-detail-meta').textContent = 'Prayer #' + p.num;

  var fav = isFavorite('prayer', p.num);
  var favBtn = document.getElementById('prayer-fav-btn');
  favBtn.textContent = fav ? 'Favorited' : 'Favorite';
  favBtn.classList.toggle('on', fav);

  var textEl = document.getElementById('prayer-detail-text');
  textEl.className = 'detail-text loading';
  textEl.textContent = 'Loading prayer...';

  showView('view-prayer-detail');
  $backBtn.style.display = 'flex';
  $headerTitle.textContent = 'Prayer #' + p.num;
  history.pushState({ tab: currentTab, detail: 'prayer', num: num }, '', '');

  fetch('./data/prayers/' + p.file + '.txt')
    .then(function(r) {
      if (!r.ok) throw new Error('Not found');
      return r.text();
    })
    .then(function(text) {
      textEl.className = 'detail-text';
      // Skip first 2 lines (title, blank) — prayers don't have a sermon number line
      var lines = text.split('\n');
      textEl.textContent = lines.slice(2).join('\n');
    })
    .catch(function() {
      textEl.className = 'detail-text';
      textEl.textContent = 'Prayer text not available.';
    });

  if (!nowPlayingItem || nowPlayingItem.num === p.num) {
    checkPrayerAudio(p);
  } else {
    hidePlayerPanel('pp');
  }
}

function toggleNotes() {
  console.log('toggleNotes called, currentDetailItem:', currentDetailItem ? currentDetailItem.file : 'null');
  if (!currentDetailItem) return;
  notesVisible = !notesVisible;
  document.getElementById('notes-toggle').classList.toggle('on', notesVisible);
  var section = document.getElementById('notes-section');

  if (notesVisible) {
    section.style.display = 'block';
    var notesEl = document.getElementById('notes-text');
    notesEl.textContent = 'Loading notes...';
    fetch('./data/notes/' + currentDetailItem.file + '.txt')
      .then(function(r) {
        if (!r.ok) throw new Error('Not found');
        return r.text();
      })
      .then(function(text) { notesEl.textContent = text; })
      .catch(function() { notesEl.textContent = 'Speaker notes not available.'; });
  } else {
    section.style.display = 'none';
  }
}

function goBack() {
  $backBtn.style.display = 'none';
  showView('view-' + currentTab);
  updateHeaderTitle();
  // Don't close audio on back — let it keep playing in background
}

/* ========== FAVORITES ========== */
function favKey(type, num) { return type + ':' + num; }

function isFavorite(type, num) {
  return favorites.indexOf(favKey(type, num)) !== -1;
}

function toggleFav(type, num, btnEl) {
  var key = favKey(type, num);
  var idx = favorites.indexOf(key);
  if (idx === -1) {
    favorites.push(key);
    if (btnEl) { btnEl.classList.add('favorited'); btnEl.innerHTML = '&#x2764;'; }
  } else {
    favorites.splice(idx, 1);
    if (btnEl) { btnEl.classList.remove('favorited'); btnEl.innerHTML = '&#x2661;'; }
  }
  localStorage.setItem('spurgeon-favs', JSON.stringify(favorites));
}

function toggleFavDetail() {
  if (!currentDetailItem || !currentDetailType) return;
  var key = favKey(currentDetailType, currentDetailItem.num);
  var idx = favorites.indexOf(key);
  if (idx === -1) favorites.push(key);
  else favorites.splice(idx, 1);
  localStorage.setItem('spurgeon-favs', JSON.stringify(favorites));

  var btnId = currentDetailType === 'sermon' ? 'sermon-fav-btn' : 'prayer-fav-btn';
  var btn = document.getElementById(btnId);
  var fav = isFavorite(currentDetailType, currentDetailItem.num);
  btn.textContent = fav ? 'Favorited' : 'Favorite';
  btn.classList.toggle('on', fav);
}

function renderFavorites() {
  if (favorites.length === 0) {
    $favList.innerHTML = '<div class="empty-state"><p>No favorites yet</p>'
      + '<small>Tap the heart icon on any sermon or prayer to save it here.</small></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < favorites.length; i++) {
    var parts = favorites[i].split(':');
    var type = parts[0];
    var num = parseInt(parts[1]);

    if (type === 'sermon') {
      var s = null;
      for (var j = 0; j < manifest.sermons.length; j++) {
        if (manifest.sermons[j].num === num) { s = manifest.sermons[j]; break; }
      }
      if (!s) continue;
      html += '<div class="list-item" data-type="sermon" data-num="' + s.num + '">'
        + '<div class="list-num">#' + s.num + '</div>'
        + '<div class="list-body">'
        + '<div class="list-title">' + escHtml(s.title) + '</div>'
        + (s.scripture ? '<div class="list-sub">' + escHtml(s.scripture) + '</div>' : '')
        + '</div>'
        + '<button class="list-fav favorited" data-fav-type="sermon" data-fav-num="' + s.num + '">&#x2764;</button></div>';
    } else {
      var p = null;
      for (var j = 0; j < manifest.prayers.length; j++) {
        if (manifest.prayers[j].num === num) { p = manifest.prayers[j]; break; }
      }
      if (!p) continue;
      html += '<div class="list-item" data-type="prayer" data-num="' + p.num + '">'
        + '<div class="list-num">' + p.num + '</div>'
        + '<div class="list-body">'
        + '<div class="list-title">' + escHtml(p.title) + '</div>'
        + '<div class="list-sub">Prayer</div>'
        + '</div>'
        + '<button class="list-fav favorited" data-fav-type="prayer" data-fav-num="' + p.num + '">&#x2764;</button></div>';
    }
  }
  $favList.innerHTML = html;
}

$favList.addEventListener('click', function(e) {
  var favBtn = e.target.closest('.list-fav');
  if (favBtn) {
    e.stopPropagation();
    toggleFav(favBtn.dataset.favType, parseInt(favBtn.dataset.favNum), favBtn);
    renderFavorites();
    return;
  }
  var item = e.target.closest('.list-item');
  if (!item) return;
  if (item.dataset.type === 'sermon') openSermon(parseInt(item.dataset.num));
  else openPrayer(parseInt(item.dataset.num));
});

/* ========== INDEX ========== */
var indexRendered = false;
var indexMode = 'title'; // 'title' or 'verse'

function renderIndex() {
  if (indexRendered) return;
  indexRendered = true;
  renderIndexByTitle();
  renderIndexByVerse();
}

function renderIndexByTitle() {
  var sorted = manifest.sermons.slice().sort(function(a, b) {
    return a.title.toLowerCase().localeCompare(b.title.toLowerCase());
  });
  var html = '';
  var lastLetter = '';
  for (var i = 0; i < sorted.length; i++) {
    var s = sorted[i];
    var letter = (s.title[0] || '').toUpperCase();
    if (letter !== lastLetter) {
      lastLetter = letter;
      html += '<div class="index-letter-header">' + letter + '</div>';
    }
    html += '<div class="list-item" data-type="sermon" data-num="' + s.num + '">'
      + '<div class="list-num">#' + s.num + '</div>'
      + '<div class="list-body">'
      + '<div class="list-title">' + escHtml(s.title) + '</div>'
      + (s.scripture ? '<div class="list-sub">' + escHtml(s.scripture) + '</div>' : '')
      + '</div></div>';
  }
  document.getElementById('index-title-list').innerHTML = html;
}

function renderIndexByVerse() {
  // Group sermons by Bible book
  var bookOrder = [
    'Genesis','Exodus','Leviticus','Numbers','Deuteronomy','Joshua','Judges','Ruth',
    '1 Samuel','2 Samuel','1 Kings','2 Kings','1 Chronicles','2 Chronicles',
    'Ezra','Nehemiah','Esther','Job','Psalm','Psalms','Proverbs','Ecclesiastes',
    'Song of Solomon','Isaiah','Jeremiah','Lamentations','Ezekiel','Daniel',
    'Hosea','Joel','Amos','Obadiah','Jonah','Micah','Nahum','Habakkuk',
    'Zephaniah','Haggai','Zechariah','Malachi',
    'Matthew','Mark','Luke','John','Acts','Romans',
    '1 Corinthians','2 Corinthians','Galatians','Ephesians','Philippians',
    'Colossians','1 Thessalonians','2 Thessalonians','1 Timothy','2 Timothy',
    'Titus','Philemon','Hebrews','James','1 Peter','2 Peter',
    '1 John','2 John','3 John','Jude','Revelation'
  ];
  var bookMap = {};
  for (var i = 0; i < bookOrder.length; i++) bookMap[bookOrder[i].toLowerCase()] = i;

  function parseBook(ref) {
    if (!ref) return { book: '', ch: 0, vs: 0 };
    // Match book name (possibly with leading number)
    var m = ref.match(/^(\d?\s*[A-Za-z]+(?:\s+[A-Za-z]+)?)\s*(\d*):?(\d*)/);
    if (!m) return { book: ref, ch: 0, vs: 0 };
    return { book: m[1].trim(), ch: parseInt(m[2]) || 0, vs: parseInt(m[3]) || 0 };
  }

  var withScripture = manifest.sermons.filter(function(s) { return s.scripture; });
  withScripture.sort(function(a, b) {
    var pa = parseBook(a.scripture);
    var pb = parseBook(b.scripture);
    var oa = bookMap[pa.book.toLowerCase()];
    var ob = bookMap[pb.book.toLowerCase()];
    if (oa === undefined) oa = 999;
    if (ob === undefined) ob = 999;
    if (oa !== ob) return oa - ob;
    if (pa.ch !== pb.ch) return pa.ch - pb.ch;
    return pa.vs - pb.vs;
  });

  var html = '';
  var lastBook = '';
  for (var i = 0; i < withScripture.length; i++) {
    var s = withScripture[i];
    var parsed = parseBook(s.scripture);
    var bookName = parsed.book;
    if (bookName.toLowerCase() !== lastBook.toLowerCase()) {
      lastBook = bookName;
      html += '<div class="index-letter-header">' + escHtml(bookName) + '</div>';
    }
    html += '<div class="list-item" data-type="sermon" data-num="' + s.num + '">'
      + '<div class="list-num">#' + s.num + '</div>'
      + '<div class="list-body">'
      + '<div class="list-title">' + escHtml(s.title) + '</div>'
      + '<div class="list-sub">' + escHtml(s.scripture) + '</div>'
      + '</div></div>';
  }

  // Add sermons without scripture at the end
  var noScripture = manifest.sermons.filter(function(s) { return !s.scripture; });
  if (noScripture.length > 0) {
    html += '<div class="index-letter-header">No Scripture Reference</div>';
    for (var i = 0; i < noScripture.length; i++) {
      var s = noScripture[i];
      html += '<div class="list-item" data-type="sermon" data-num="' + s.num + '">'
        + '<div class="list-num">#' + s.num + '</div>'
        + '<div class="list-body">'
        + '<div class="list-title">' + escHtml(s.title) + '</div>'
        + '</div></div>';
    }
  }
  document.getElementById('index-verse-list').innerHTML = html;
}

// Index tab switching
document.getElementById('idx-tab-title').addEventListener('click', function() {
  indexMode = 'title';
  this.classList.add('active');
  document.getElementById('idx-tab-verse').classList.remove('active');
  document.getElementById('index-title-list').style.display = 'block';
  document.getElementById('index-verse-list').style.display = 'none';
});
document.getElementById('idx-tab-verse').addEventListener('click', function() {
  indexMode = 'verse';
  this.classList.add('active');
  document.getElementById('idx-tab-title').classList.remove('active');
  document.getElementById('index-title-list').style.display = 'none';
  document.getElementById('index-verse-list').style.display = 'block';
});

// Index list click handler
document.getElementById('index-title-list').addEventListener('click', function(e) {
  var item = e.target.closest('.list-item');
  if (item) openSermon(parseInt(item.dataset.num));
});
document.getElementById('index-verse-list').addEventListener('click', function(e) {

  if (item) openSermon(parseInt(item.dataset.num));
});

/* ========== RESOURCES ========== */
var resourcesData = [];
var resourcesRendered = false;

function renderResources() {
  if (resourcesRendered) return;
  fetch('./data/extras/manifest.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      resourcesData = data;
      resourcesRendered = true;
      var html = '';
      for (var i = 0; i < data.length; i++) {
        var r = data[i];
        html += '<div class="list-item" data-resource-id="' + r.id + '">'
          + '<div class="list-body">'
          + '<div class="list-title">' + escHtml(r.title) + '</div>'
          + '<div class="list-sub">' + escHtml(r.speaker) + (r.location ? ' — ' + escHtml(r.location) : '') + '</div>'
          + '</div></div>';
      }
      document.getElementById('resources-list').innerHTML = html;
    })
    .catch(function() {
      document.getElementById('resources-list').innerHTML = '<div class="empty-state"><p>No resources available</p></div>';
    });
}

function openResource(id) {
  var r = null;
  for (var i = 0; i < resourcesData.length; i++) {
    if (resourcesData[i].id === id) { r = resourcesData[i]; break; }
  }
  if (!r) return;
  currentDetailType = 'resource';
  currentDetailItem = r;

  document.getElementById('resource-detail-title').textContent = r.title;
  document.getElementById('resource-detail-meta').textContent = r.speaker + (r.location ? ' — ' + r.location : '');

  var textEl = document.getElementById('resource-detail-text');
  textEl.className = 'detail-text loading';
  textEl.textContent = 'Loading...';

  showView('view-resource-detail');
  $backBtn.style.display = 'flex';
  $headerTitle.textContent = r.title;
  history.pushState({ tab: currentTab, detail: 'resource', id: id }, '', '');

  fetch('./data/extras/' + r.file)
    .then(function(resp) {
      if (!resp.ok) throw new Error('Not found');
      return resp.text();
    })
    .then(function(html) {
      textEl.className = 'detail-text';
      textEl.innerHTML = html;
    })
    .catch(function() {
      textEl.className = 'detail-text';
      textEl.textContent = 'Resource not available.';
    });
}

document.getElementById('resources-list').addEventListener('click', function(e) {
  var item = e.target.closest('.list-item');
  if (item && item.dataset.resourceId) openResource(item.dataset.resourceId);
});

/* ========== SEARCH ========== */
function onSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 200);
}

function doSearch() {
  var q = $searchInput.value.trim().toLowerCase();
  if (q.length < 2) {
    $searchResults.innerHTML = '<div class="search-hint">Search sermons and prayers by title, sermon number, or scripture reference.</div>';
    return;
  }

  var results = [];
  var numQ = parseInt(q);
  var isNum = !isNaN(numQ) && String(numQ) === q;

  for (var i = 0; i < manifest.sermons.length && results.length < 100; i++) {
    var s = manifest.sermons[i];
    if (
      s.title.toLowerCase().indexOf(q) !== -1 ||
      s.scripture.toLowerCase().indexOf(q) !== -1 ||
      (isNum && s.num === numQ)
    ) {
      results.push({ type: 'sermon', item: s });
    }
  }

  for (var i = 0; i < manifest.prayers.length; i++) {
    var p = manifest.prayers[i];
    if (
      p.title.toLowerCase().indexOf(q) !== -1 ||
      (isNum && p.num === numQ)
    ) {
      results.push({ type: 'prayer', item: p });
    }
  }

  if (results.length === 0) {
    $searchResults.innerHTML = '<div class="search-hint">No results found for "' + escHtml(q) + '"</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    if (r.type === 'sermon') {
      html += '<div class="list-item" data-type="sermon" data-num="' + r.item.num + '">'
        + '<div class="list-num">#' + r.item.num + '</div>'
        + '<div class="list-body">'
        + '<div class="list-title">' + escHtml(r.item.title) + '</div>'
        + (r.item.scripture ? '<div class="list-sub">' + escHtml(r.item.scripture) + '</div>' : '')
        + '</div></div>';
    } else {
      html += '<div class="list-item" data-type="prayer" data-num="' + r.item.num + '">'
        + '<div class="list-num">' + r.item.num + '</div>'
        + '<div class="list-body">'
        + '<div class="list-title">' + escHtml(r.item.title) + '</div>'
        + '<div class="list-sub">Prayer</div>'
        + '</div></div>';
    }
  }
  $searchResults.innerHTML = html;
}

$searchResults.addEventListener('click', function(e) {
  var item = e.target.closest('.list-item');
  if (!item) return;
  if (item.dataset.type === 'sermon') openSermon(parseInt(item.dataset.num));
  else openPrayer(parseInt(item.dataset.num));
});

/* ========== AUDIO ========== */
function checkSermonAudio(file) {
  var prefix = 'sp';
  activePlayer = prefix;
  nowPlayingType = 'sermon';
  nowPlayingItem = currentDetailItem;
  showNowPlayingTab();
  resetPlayerState(prefix);
  var mp3url = './data/mp3/' + file + '.mp3';
  fetch(mp3url, { method: 'HEAD' })
    .then(function(r) {
      if (r.ok) {
        playerState[prefix].ttsMode = false;
        setPlayerBadge(prefix, 'mp3');
        $audioEl.src = mp3url;
        $audioEl.load();
        showPlayerPanel(prefix);
      } else {
        throw new Error('No MP3');
      }
    })
    .catch(function() {
      if (!ttsAvailable) return;
      loadSsmlForTts(file, prefix, './data/ssml/');
    });
}

function checkPrayerAudio(prayer) {
  var prefix = 'pp';
  activePlayer = prefix;
  nowPlayingType = 'prayer';
  nowPlayingItem = currentDetailItem;
  showNowPlayingTab();
  resetPlayerState(prefix);
  var numStr = String(prayer.num).padStart(2, '0');
  var mp3url = './data/mp3/' + numStr + '_' + prayer.file.replace(/^\d+/, '') + '.mp3';
  fetch(mp3url, { method: 'HEAD' })
    .then(function(r) {
      if (r.ok) {
        playerState[prefix].ttsMode = false;
        setPlayerBadge(prefix, 'mp3');
        $audioEl.src = mp3url;
        $audioEl.load();
        showPlayerPanel(prefix);
      } else {
        throw new Error('No MP3');
      }
    })
    .catch(function() {
      if (!ttsAvailable) return;
      var ssmlFile = String(prayer.num).padStart(2, '0') + '_' + prayer.file.replace(/^\d+/, '');
      loadSsmlForTts(ssmlFile, prefix, './data/prayers_ssml/');
    });
}

/* ========== TTS ========== */
function loadSsmlForTts(file, prefix, ssmlDir) {
  fetch(ssmlDir + file + '.ssml')
    .then(function(r) {
      if (!r.ok) throw new Error('No SSML');
      return r.text();
    })
    .then(function(ssml) {
      var st = playerState[prefix];
      st.ttsMode = true;
      setPlayerBadge(prefix, 'tts');
      var plainText = ssmlToPlainText(ssml);
      st.ttsChunks = chunkText(plainText, 3000);
      st.ttsChunkIdx = 0;
      st.ttsSpeaking = false;
      st.ttsPaused = false;
      showPlayerPanel(prefix);
      updateTtsProgress(prefix);
    })
    .catch(function() {
      // No SSML available either
    });
}

function ssmlToPlainText(ssml) {
  // Remove XML declaration and <speak> wrapper
  var text = ssml.replace(/<\?xml[^>]*\?>/g, '');
  // Convert <break> tags to pauses (periods for natural pausing)
  text = text.replace(/<break[^>]*\/>/g, ' ');
  // Convert <sub> tags: use alias text
  text = text.replace(/<sub[^>]*alias="([^"]*)"[^>]*>[^<]*<\/sub>/g, '$1');
  // Remove all remaining XML/SSML tags
  text = text.replace(/<[^>]+>/g, '');
  // Collapse whitespace
  text = text.replace(/\s+/g, ' ');
  // Decode basic entities
  text = text.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
  return text.trim();
}

function chunkText(text, maxLen) {
  // Split on sentence boundaries, grouping into chunks under maxLen
  var sentences = text.split(/(?<=[.!?])\s+/);
  var chunks = [];
  var current = '';
  for (var i = 0; i < sentences.length; i++) {
    var s = sentences[i];
    if (current.length + s.length + 1 > maxLen && current.length > 0) {
      chunks.push(current.trim());
      current = '';
    }
    current += (current ? ' ' : '') + s;
  }
  if (current.trim()) chunks.push(current.trim());
  // Ensure we have at least one chunk
  if (chunks.length === 0 && text.trim()) chunks.push(text.trim());
  return chunks;
}

function updateTtsProgress(prefix) {
  var st = playerState[prefix];
  var els = getPlayerEls(prefix);
  if (st.ttsChunks.length > 0) {
    els.slider.max = st.ttsChunks.length - 1;
    els.slider.value = st.ttsChunkIdx;
    els.timeCur.textContent = (st.ttsChunkIdx + 1) + '/' + st.ttsChunks.length;
    els.timeEnd.textContent = st.ttsChunks.length + ' chunks';
  }
}

function scrollToChunk(prefix, idx) {
  var st = playerState[prefix];
  if (!st.ttsChunks[idx]) return;
  var textElId = prefix === 'sp' ? 'sermon-detail-text' : 'prayer-detail-text';
  var textEl = document.getElementById(textElId);
  if (!textEl) return;

  // Get first ~60 chars of the chunk to search for in the DOM
  var snippet = st.ttsChunks[idx].substring(0, 60).replace(/[.*+?^${}()|[\]\\]/g, '');
  if (snippet.length < 10) return;

  // Search through paragraphs and text nodes for the snippet
  var paragraphs = textEl.querySelectorAll('p, div.verse, blockquote, h2');
  var target = null;
  for (var i = 0; i < paragraphs.length; i++) {
    var pText = paragraphs[i].textContent || '';
    if (pText.indexOf(snippet.substring(0, 30)) !== -1) {
      target = paragraphs[i];
      break;
    }
  }

  // Fallback: estimate position by chunk ratio
  if (!target && paragraphs.length > 0) {
    var ratio = idx / st.ttsChunks.length;
    var estIdx = Math.floor(ratio * paragraphs.length);
    target = paragraphs[Math.min(estIdx, paragraphs.length - 1)];
  }

  if (target) {
    // Remove previous highlight
    textEl.querySelectorAll('.chunk-active').forEach(function(el) {
      el.classList.remove('chunk-active');
    });
    target.classList.add('chunk-active');
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function speakChunk(prefix, idx) {
  var st = playerState[prefix];
  if (idx >= st.ttsChunks.length) {
    st.ttsSpeaking = false;
    st.ttsPaused = false;
    st.playing = false;
    var els = getPlayerEls(prefix);
    els.play.innerHTML = '&#9654;';
    els.slider.value = st.ttsChunks.length - 1;
    els.timeCur.textContent = st.ttsChunks.length + '/' + st.ttsChunks.length;
    return;
  }
  st.ttsChunkIdx = idx;
  st.ttsSpeaking = true;
  updateTtsProgress(prefix);
  scrollToChunk(prefix, idx);

  if (ttsUseNative) {
    speakNative(prefix, st.ttsChunks[idx]);
  } else {
    speakWeb(prefix, st.ttsChunks[idx]);
  }
}

function speakNative(prefix, text) {
  var st = playerState[prefix];
  var els = getPlayerEls(prefix);
  var TTS = window.Capacitor.Plugins.TextToSpeech;
  TTS.speak({
    text: text,
    lang: 'en-GB',
    rate: 0.85 * speeds[st.speedIdx],
    pitch: 1.0,
    volume: 1.0,
    category: 'playback'
  }).then(function() {
    if (st.ttsSpeaking && !st.ttsPaused) {
      speakChunk(prefix, st.ttsChunkIdx + 1);
    }
  }).catch(function(err) {
    console.error('TTS error:', err);
    st.ttsSpeaking = false;
    st.playing = false;
    els.play.innerHTML = '&#9654;';
  });
}

function speakWeb(prefix, text) {
  var st = playerState[prefix];
  var els = getPlayerEls(prefix);
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-GB';
  utter.rate = 0.85 * speeds[st.speedIdx];
  utter.pitch = 1.0;
  utter.volume = 1.0;

  utter.onend = function() {
    if (st.ttsSpeaking && !st.ttsPaused) {
      speakChunk(prefix, st.ttsChunkIdx + 1);
    }
  };
  utter.onerror = function(e) {
    if (e.error === 'canceled' || e.error === 'interrupted') return;
    console.error('Web TTS error:', e);
    st.ttsSpeaking = false;
    st.playing = false;
    els.play.innerHTML = '&#9654;';
  };

  window.speechSynthesis.speak(utter);
}

function stopTts(prefix) {
  var st = playerState[prefix];
  st.ttsSpeaking = false;
  st.ttsPaused = false;
  if (ttsUseNative) {
    try {
      var TTS = window.Capacitor.Plugins.TextToSpeech;
      TTS.stop();
    } catch(e) {}
  } else {
    window.speechSynthesis.cancel();
  }
}

function togglePlayerAudio(prefix) {
  var st = playerState[prefix];
  var els = getPlayerEls(prefix);

  if (st.ttsMode) {
    if (st.ttsSpeaking && !st.ttsPaused) {
      st.ttsPaused = true;
      st.playing = false;
      els.play.innerHTML = '&#9654;';
      if (ttsUseNative) {
        try { window.Capacitor.Plugins.TextToSpeech.stop(); } catch(e) {}
      } else {
        window.speechSynthesis.cancel();
      }
    } else if (st.ttsPaused) {
      st.ttsPaused = false;
      st.playing = true;
      els.play.innerHTML = '&#x23F8;';
      speakChunk(prefix, st.ttsChunkIdx);
    } else {
      st.playing = true;
      els.play.innerHTML = '&#x23F8;';
      speakChunk(prefix, st.ttsChunkIdx);
    }
  } else {
    if (st.playing) {
      $audioEl.pause();
      st.playing = false;
      els.play.innerHTML = '&#9654;';
    } else {
      $audioEl.play();
      st.playing = true;
      els.play.innerHTML = '&#x23F8;';
    }
  }
}

function closeAudio() {
  ['sp', 'pp'].forEach(function(prefix) {
    var st = playerState[prefix];
    if (st.ttsMode) {
      stopTts(prefix);
    }
    resetPlayerState(prefix);
    hidePlayerPanel(prefix);
  });
  $audioEl.pause();
  $audioEl.removeAttribute('src');
  activePlayer = null;
  nowPlayingType = null;
  nowPlayingItem = null;
  hideNowPlayingTab();
}

function formatTime(s) {
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

/* ========== UTILITY ========== */
function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ========== START ========== */
init();

})();
</script>
